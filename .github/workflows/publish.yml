name: Publish extension

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Least privilege: the only write this job needs is creating/attaching the
    # GitHub release. Marketplace / Open VSX auth is via PATs, not GITHUB_TOKEN.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - name: Package .vsix
        run: npx --yes @vscode/vsce package --no-yarn --out vscode-kicad-dru.vsix

      - name: Upload .vsix as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-kicad-dru.vsix

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v') && env.VSCE_PAT != ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath vscode-kicad-dru.vsix --pat "$VSCE_PAT"

      - name: Publish to Open VSX
        if: startsWith(github.ref, 'refs/tags/v') && env.OVSX_PAT != ''
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish vscode-kicad-dru.vsix -p "$OVSX_PAT"

      - name: Attach .vsix to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        # SHA-pinned (supply-chain hygiene): third-party action pinned to the
        # exact commit behind the v2 tag. A v3 line exists — bump deliberately
        # after reviewing its changelog, not implicitly via a moving tag.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: vscode-kicad-dru.vsix
